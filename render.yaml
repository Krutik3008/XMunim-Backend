services:
  - type: web
    name: xmunim-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DB_NAME
        value: XMunim
      - key: CORS_ORIGINS
        value: "*"
      - key: MONGO_URL
        sync: false
